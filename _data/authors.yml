# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
cmoran:
  name:              Connor Moran
  email:             connor.nelson.moran@gmail.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    I’m a Manchester-based Game Designer with over 6 years of experience, using a technical programming background to produce structured, feasible game designs. Having worked on projects for clients like Sony and Rolls-Royce, I focus on bridging the gap between creative concepts and functional implementation.
    
    When I’m not designing, I’m usually running TTRPG sessions, 3D printing, or practicing the art of pâtisserie and confectionery.
